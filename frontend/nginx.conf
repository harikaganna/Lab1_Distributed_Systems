server {
    listen 3006;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth endpoints -> user-service
    location /auth/ {
        proxy_pass http://user-service:8001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # User endpoints -> user-service
    location /users/ {
        proxy_pass http://user-service:8001/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Review endpoints (must come BEFORE /restaurants to match first)
    # Pattern: /restaurants/{id}/reviews
    location ~ ^/restaurants/([^/]+)/reviews {
        proxy_pass http://review-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Restaurant endpoints -> restaurant-service
    location /restaurants {
        proxy_pass http://restaurant-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Favourites endpoints -> favourites-service
    location /favourites {
        proxy_pass http://favourites-service:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploaded files -> user-service
    location /uploads/ {
        proxy_pass http://user-service:8001/uploads/;
        proxy_set_header Host $host;
    }
}
