server {
    listen 3006;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend SPA - handles all page navigation (/restaurants/:id, /favourites, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth endpoints -> user-service
    location /auth/ {
        proxy_pass http://user-service:8001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # User endpoints -> user-service
    location /users/ {
        proxy_pass http://user-service:8001/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Review endpoints (must come BEFORE /api/restaurants)
    location ~ ^/api/restaurants/[^/]+/reviews {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://review-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Restaurant endpoints -> restaurant-service
    location ~ ^/api/restaurants {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://restaurant-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Favourites endpoints -> favourites-service
    location ~ ^/api/favourites {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://favourites-service:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI assistant endpoints -> ai-service
    location /ai-assistant/ {
        proxy_pass http://ai-service:8005/ai-assistant/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Uploaded files -> user-service
    location /uploads/ {
        proxy_pass http://user-service:8001/uploads/;
        proxy_set_header Host $host;
    }
}
