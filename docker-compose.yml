services:
  # --- Infrastructure ---
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - yelp-net
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - yelp-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - yelp-net
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 10

  # --- Seed MongoDB ---
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile.seed
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - yelp-net

  # --- API Services (Producers) ---
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.user
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    networks:
      - yelp-net

  restaurant-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.restaurant
    ports:
      - "8002:8002"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    networks:
      - yelp-net

  review-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.review
    ports:
      - "8003:8003"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yelp-net

  favourites-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.favourites
    ports:
      - "8004:8004"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yelp-net

  ai-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.ai
    ports:
      - "8005:8005"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    networks:
      - yelp-net

  # --- Worker Services (Consumers) ---
  review-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.review-worker
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - yelp-net

  restaurant-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.restaurant-worker
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - yelp-net

  user-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.user-worker
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - yelp-net

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
    ports:
      - "3009:3006"
    depends_on:
      - user-service
      - restaurant-service
      - review-service
      - favourites-service
      - ai-service
    networks:
      - yelp-net

volumes:
  mongo_data:
  uploads:

networks:
  yelp-net:
    driver: bridge
