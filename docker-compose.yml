services:
  # --- Infrastructure ---
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - yelp-net
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - yelp-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - yelp-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- Seed MongoDB ---
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile.seed
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - yelp-net

  # --- API Services (Producers) ---
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.user
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    networks:
      - yelp-net

  restaurant-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.restaurant
    ports:
      - "8002:8002"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    networks:
      - yelp-net

  review-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.review
    ports:
      - "8003:8003"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yelp-net

  favourites-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.favourites
    ports:
      - "8004:8004"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yelp-net

  owner-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.owner
    ports:
      - "8006:8006"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    networks:
      - yelp-net

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - yelp-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.1"]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - yelp-net

  ai-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.ai
    ports:
      - "8005:8005"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:latest}
    depends_on:
      mongodb:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    networks:
      - yelp-net

  # --- Worker Services (Consumers) ---
  review-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.review-worker
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - yelp-net

  restaurant-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.restaurant-worker
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - yelp-net

  user-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.user-worker
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - yelp-net

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
    ports:
      - "3009:3006"
    depends_on:
      - user-service
      - restaurant-service
      - review-service
      - favourites-service
      - ai-service
    networks:
      - yelp-net

volumes:
  mongo_data:
  uploads:
  ollama_data:

networks:
  yelp-net:
    driver: bridge
